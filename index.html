<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚽ Juggle Challenge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a1f0a;
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #app { width: 100%; max-width: 480px; height: 100dvh; position: relative; }

  /* === SCREENS === */
  .screen {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .screen.active { display: flex; }

  /* === HOME === */
  #screen-home {
    background: radial-gradient(ellipse at center, #1a4a1a 0%, #0a1f0a 70%);
    gap: 24px;
  }
  #screen-home .pitch-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .ball-icon { font-size: 72px; animation: bounce 1.2s infinite ease-in-out; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-16px); }
  }
  h1 { font-size: 32px; text-transform: uppercase; letter-spacing: 2px; color: #4ade80; }
  .subtitle { font-size: 15px; color: #86efac; opacity: 0.8; }
  .btn {
    background: #16a34a;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 40px;
    font-size: 20px;
    font-family: inherit;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    width: 100%;
    max-width: 280px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: #15803d; transform: scale(0.97); }
  .btn.secondary {
    background: transparent;
    border: 2px solid #4ade80;
    color: #4ade80;
    font-size: 15px;
    padding: 12px 32px;
    margin-top: -8px;
  }
  .notice { font-size: 12px; color: #4ade80; opacity: 0.5; }

  /* === PLAYER SETUP === */
  #screen-setup { gap: 20px; background: #0a1f0a; }
  #screen-setup h2 { font-size: 24px; color: #4ade80; }
  .player-badge {
    font-size: 48px;
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #1a4a1a;
    border: 3px solid #16a34a;
  }

  /* === CAMERA / GAME === */
  #screen-game {
    padding: 0;
    position: relative;
    background: #000;
  }
  #camera { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #canvas-overlay {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }
  .player-tag {
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #4ade80;
  }
  #score-display {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #4ade80, 0 2px 8px rgba(0,0,0,0.8);
    line-height: 1;
  }
  .score-label { font-size: 11px; color: #86efac; letter-spacing: 2px; text-transform: uppercase; }
  .detect-badge {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(22,163,74,0.85);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .detect-badge.visible { opacity: 1; }
  .btn-stop {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(220,38,38,0.85);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .audio-indicator {
    position: absolute;
    top: 80px; right: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  /* === HANDOFF === */
  #screen-handoff {
    gap: 20px;
    background: radial-gradient(ellipse, #1a4a1a, #0a1f0a);
  }
  #handoff-score { font-size: 80px; font-weight: 900; color: #4ade80; }
  #screen-handoff h2 { font-size: 22px; color: #fff; }
  #screen-handoff p { color: #86efac; font-size: 15px; }

  /* === RESULT === */
  #screen-result {
    gap: 20px;
    background: radial-gradient(ellipse, #1a3a1a, #0a1f0a);
  }
  .winner-crown { font-size: 56px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  #result-title { font-size: 28px; color: #fbbf24; text-transform: uppercase; letter-spacing: 2px; }
  .score-cards {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 340px;
  }
  .score-card {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px;
    border: 2px solid transparent;
  }
  .score-card.winner { border-color: #fbbf24; background: rgba(251,191,36,0.1); }
  .score-card .p-name { font-size: 12px; color: #86efac; text-transform: uppercase; letter-spacing: 1px; }
  .score-card .p-score { font-size: 48px; font-weight: 900; }
  .score-card.winner .p-score { color: #fbbf24; }
  #btn-download { background: #1d4ed8; }
  #btn-download:active { background: #1e40af; }
  #btn-share { background: #0891b2; }
  .btn-row { display: flex; gap: 12px; width: 100%; max-width: 340px; }
  .btn-row .btn { flex: 1; font-size: 15px; padding: 14px 8px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="pitch-lines"></div>
    <div class="ball-icon">⚽</div>
    <h1>Juggle<br>Challenge</h1>
    <p class="subtitle">Quem faz mais keepups?</p>
    <button class="btn" onclick="startChallenge()">Jogar</button>
    <button class="btn secondary" onclick="startSolo()">Modo Solo</button>
    <p class="notice">Aponta a câmara para a bola</p>
  </div>

  <!-- SETUP PLAYER -->
  <div id="screen-setup" class="screen">
    <div class="player-badge" id="setup-badge">👤</div>
    <h2 id="setup-title">Jogador 1</h2>
    <p style="color:#86efac;font-size:14px">Posiciona-te e prepara-te</p>
    <button class="btn" id="btn-go" onclick="startPlayer()">GO ⚽</button>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="canvas-overlay"></canvas>
    <div class="game-hud">
      <div>
        <div class="player-tag" id="current-player-tag">Jogador 1</div>
        <div class="score-label">KEEPUPS</div>
      </div>
      <div id="score-display">0</div>
    </div>
    <div class="detect-badge" id="detect-badge">⚽ +1</div>
    <div class="audio-indicator" id="audio-indicator">🔇</div>
    <button class="btn-stop" onclick="stopPlayer()">PARAR</button>
  </div>

  <!-- HANDOFF -->
  <div id="screen-handoff" class="screen">
    <div style="font-size:28px">⚽ Jogador 1</div>
    <div id="handoff-score">0</div>
    <h2>Agora é a vez do</h2>
    <div style="font-size:24px;color:#4ade80;font-weight:900">Jogador 2</div>
    <p>Passa o telemóvel</p>
    <button class="btn" onclick="setupPlayer(2)">Pronto ✊</button>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="winner-crown">🏆</div>
    <div id="result-title">Vencedor!</div>
    <div class="score-cards">
      <div class="score-card" id="card-p1">
        <div class="p-name">Jogador 1</div>
        <div class="p-score" id="result-p1">0</div>
      </div>
      <div class="score-card" id="card-p2">
        <div class="p-name">Jogador 2</div>
        <div class="p-score" id="result-p2">0</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-download" onclick="downloadClip()">💾 Clip</button>
      <button class="btn" id="btn-share" onclick="shareClip()">📤 Share</button>
    </div>
    <button class="btn secondary" onclick="reset()">Jogar de novo</button>
  </div>

</div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
const state = {
  mode: '2p',          // '2p' | 'solo'
  currentPlayer: 1,
  scores: [0, 0],
  stream: null,
  mediaRecorder: null,
  recordedChunks: [],
  lastBlob: null,
  animFrame: null,
  audioCtx: null,
  analyser: null,
  audioActive: false,
  // Vision tracking
  prevFrame: null,
  ballY: null,
  ballYHistory: [],
  dropTimer: null,
  juggleCount: 0,
  lastJuggleTime: 0,
  inCooldown: false,
  sessionActive: false,
};

const DROP_TIMEOUT_MS = 2000;
const JUGGLE_COOLDOWN_MS = 400;
const MOTION_THRESHOLD = 18;       // pixels of motion to consider "ball moving"
const MIN_BLOB_SIZE = 200;         // min motion blob area (px²)

// ─── NAVIGATION ─────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function startChallenge() { state.mode = '2p'; setupPlayer(1); }
function startSolo()      { state.mode = 'solo'; setupPlayer(1); }

function setupPlayer(n) {
  state.currentPlayer = n;
  document.getElementById('setup-badge').textContent = n === 1 ? '1️⃣' : '2️⃣';
  document.getElementById('setup-title').textContent = `Jogador ${n}`;
  show('setup');
}

async function startPlayer() {
  try {
    await initCamera();
    initAudio();
    show('game');
    document.getElementById('current-player-tag').textContent =
      `Jogador ${state.currentPlayer}`;
    beginTracking();
  } catch(e) {
    alert('Precisamos de acesso à câmara: ' + e.message);
  }
}

function stopPlayer() {
  endSession(true); // manual stop
}

// ─── CAMERA ─────────────────────────────────────────────────────────────────
async function initCamera() {
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); }
  state.stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: true
  });
  const video = document.getElementById('camera');
  video.srcObject = state.stream;
  await new Promise(r => video.onloadedmetadata = r);

  const canvas = document.getElementById('canvas-overlay');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
}

// ─── AUDIO DETECTION ────────────────────────────────────────────────────────
function initAudio() {
  try {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = state.audioCtx.createMediaStreamSource(state.stream);
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = 256;
    source.connect(state.analyser);
    state.audioActive = true;
    document.getElementById('audio-indicator').textContent = '🎙️';
  } catch(e) {
    state.audioActive = false;
    document.getElementById('audio-indicator').textContent = '🔇';
  }
}

function getAudioPeak() {
  if (!state.audioActive || !state.analyser) return 0;
  const data = new Uint8Array(state.analyser.frequencyBinCount);
  state.analyser.getByteFrequencyData(data);
  return Math.max(...data);
}

// ─── VISION TRACKING ────────────────────────────────────────────────────────
function beginTracking() {
  state.juggleCount = 0;
  state.scores[state.currentPlayer - 1] = 0;
  state.ballYHistory = [];
  state.prevFrame = null;
  state.sessionActive = true;
  state.lastJuggleTime = 0;
  state.inCooldown = false;
  updateScoreDisplay(0);
  startRecording();
  resetDropTimer();
  loop();
}

function loop() {
  if (!state.sessionActive) return;
  state.animFrame = requestAnimationFrame(loop);

  const video  = document.getElementById('camera');
  const canvas = document.getElementById('canvas-overlay');
  const ctx    = canvas.getContext('2d', { willReadFrequently: true });
  const W = canvas.width, H = canvas.height;

  ctx.drawImage(video, 0, 0, W, H);

  const frame = ctx.getImageData(0, 0, W, H);
  if (state.prevFrame) {
    const { cx, cy, area } = motionCentroid(state.prevFrame.data, frame.data, W, H);

    if (area > MIN_BLOB_SIZE) {
      // Motion found — reset drop timer
      resetDropTimer();

      // Draw ball indicator
      ctx.beginPath();
      ctx.arc(cx, cy, 24, 0, Math.PI * 2);
      ctx.strokeStyle = '#4ade80';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Track Y for juggle detection (ball kicked upward then falls)
      state.ballYHistory.push(cy);
      if (state.ballYHistory.length > 8) state.ballYHistory.shift();

      const audioPeak = getAudioPeak();
      detectJuggle(cy, audioPeak, W, H);
    }
  }

  state.prevFrame = frame;
  drawHUD(ctx, W, H);
}

function motionCentroid(prev, curr, W, H) {
  let sumX = 0, sumY = 0, count = 0;
  for (let i = 0; i < prev.length; i += 4) {
    const dr = Math.abs(curr[i]   - prev[i]);
    const dg = Math.abs(curr[i+1] - prev[i+1]);
    const db = Math.abs(curr[i+2] - prev[i+2]);
    if (dr + dg + db > MOTION_THRESHOLD * 3) {
      const px = (i / 4) % W;
      const py = Math.floor((i / 4) / W);
      sumX += px; sumY += py; count++;
    }
  }
  return count > 0
    ? { cx: sumX / count, cy: sumY / count, area: count }
    : { cx: 0, cy: 0, area: 0 };
}

function detectJuggle(cy, audioPeak, W, H) {
  if (state.inCooldown) return;
  const hist = state.ballYHistory;
  if (hist.length < 5) return;

  // Ball going down then up = kick (Y increases then decreases in canvas coords)
  const mid = Math.floor(hist.length / 2);
  const firstHalf  = hist.slice(0, mid);
  const secondHalf = hist.slice(mid);
  const wasGoingDown  = firstHalf[firstHalf.length-1]   > firstHalf[0];
  const nowGoingUp    = secondHalf[secondHalf.length-1]  < secondHalf[0];
  const dirChange = wasGoingDown && nowGoingUp;

  // Audio: a peak above ~90 means a kick sound (tunable)
  const audioKick = audioPeak > 90;

  if (dirChange || audioKick) {
    registerJuggle();
  }
}

function registerJuggle() {
  state.inCooldown = true;
  state.juggleCount++;
  state.scores[state.currentPlayer - 1] = state.juggleCount;
  updateScoreDisplay(state.juggleCount);
  flashDetect();
  setTimeout(() => { state.inCooldown = false; }, JUGGLE_COOLDOWN_MS);
}

function resetDropTimer() {
  clearTimeout(state.dropTimer);
  state.dropTimer = setTimeout(() => {
    if (state.sessionActive) endSession(false);
  }, DROP_TIMEOUT_MS);
}

function drawHUD(ctx, W, H) {
  // Vignette
  const grad = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.8);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── SESSION END ─────────────────────────────────────────────────────────────
function endSession(manual) {
  state.sessionActive = false;
  cancelAnimationFrame(state.animFrame);
  clearTimeout(state.dropTimer);
  stopRecording();

  const p = state.currentPlayer;
  if (state.mode === 'solo' || p === 2) {
    showResult();
  } else {
    // Handoff to player 2
    document.getElementById('handoff-score').textContent = state.juggleCount;
    show('handoff');
  }
}

// ─── RECORDING ──────────────────────────────────────────────────────────────
function startRecording() {
  state.recordedChunks = [];
  state.lastBlob = null;
  const canvas = document.getElementById('canvas-overlay');
  const canvasStream = canvas.captureStream(30);

  // Add audio track if available
  if (state.stream) {
    state.stream.getAudioTracks().forEach(t => canvasStream.addTrack(t));
  }

  const options = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? { mimeType: 'video/webm;codecs=vp9' }
    : MediaRecorder.isTypeSupported('video/webm')
    ? { mimeType: 'video/webm' }
    : {};

  state.mediaRecorder = new MediaRecorder(canvasStream, options);
  state.mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) state.recordedChunks.push(e.data);
  };
  state.mediaRecorder.onstop = () => {
    state.lastBlob = new Blob(state.recordedChunks,
      { type: state.mediaRecorder.mimeType || 'video/webm' });
  };
  state.mediaRecorder.start(100);
}

function stopRecording() {
  if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
    state.mediaRecorder.stop();
  }
}

// ─── RESULT ──────────────────────────────────────────────────────────────────
function showResult() {
  const [s1, s2] = state.scores;
  document.getElementById('result-p1').textContent = s1;
  document.getElementById('result-p2').textContent = state.mode === 'solo' ? '—' : s2;

  let title, winner;
  if (state.mode === 'solo') {
    title = `${s1} keepups! ⚽`;
    winner = 1;
  } else if (s1 > s2) {
    title = 'Jogador 1 ganhou!'; winner = 1;
  } else if (s2 > s1) {
    title = 'Jogador 2 ganhou!'; winner = 2;
  } else {
    title = 'Empate! 🤝'; winner = 0;
  }

  document.getElementById('result-title').textContent = title;
  document.getElementById('card-p1').classList.toggle('winner', winner === 1);
  document.getElementById('card-p2').classList.toggle('winner', winner === 2);

  if (state.mode === 'solo') {
    document.getElementById('card-p2').style.display = 'none';
  }

  show('result');
}

function downloadClip() {
  if (!state.lastBlob) { alert('Clip ainda a processar…'); return; }
  const url = URL.createObjectURL(state.lastBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `juggle-${Date.now()}.webm`;
  a.click();
  URL.revokeObjectURL(url);
}

async function shareClip() {
  if (!state.lastBlob) { alert('Clip ainda a processar…'); return; }
  const file = new File([state.lastBlob], 'juggle.webm', { type: state.lastBlob.type });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({ files: [file], title: 'Juggle Challenge ⚽', text: `Fiz ${state.scores.join(' vs ')} keepups!` });
  } else {
    downloadClip();
  }
}

function reset() {
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); }
  state.stream = null;
  state.scores = [0, 0];
  state.lastBlob = null;
  document.getElementById('card-p2').style.display = '';
  show('home');
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function updateScoreDisplay(n) {
  document.getElementById('score-display').textContent = n;
}

function flashDetect() {
  const el = document.getElementById('detect-badge');
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 400);
}
</script>
</body>
</html>
